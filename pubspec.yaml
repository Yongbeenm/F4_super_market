name: f4_supermarket
description: "F4 Supermarket - Your Complete Shopping Experience"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.2
  firebase_storage: ^12.3.8
  google_sign_in: ^6.2.1
  
  # State Management
  provider: ^6.1.2
  
  # Local Database
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  
  # Navigation
  go_router: ^14.6.2
  
  # Image Handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # Utilities
  shared_preferences: ^2.3.3
  intl: ^0.20.1
  connectivity_plus: ^6.1.2
  uuid: ^4.5.1
  crypto: ^3.0.3
  
  # Location & Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # Notifications
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#0D5C3D"
  adaptive_icon_foreground: "assets/images/logo.jpg"
